version: '3.9'

services:
  backend:
    build: .
    command: python backend/main.py
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - BACKEND_PORT=8000
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    command: python frontend/app.py
    ports:
      - "7860:7860"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GRADIO_PORT=7860
      - BACKEND_URL=http://backend:8000
    volumes:
      - .:/app
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: research-net
